<!DOCTYPE html>
<html>
<head>
    <title>Realistic Top-Down Racer</title>
    <style>
        body { margin: 0; background: #333; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: white; border: 5px solid red; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 800;
canvas.height = 600;

const car = {
    x: 400,
    y: 300,
    width: 30,
    height: 50,
    angle: 0,
    speed: 0,
    acceleration: 0.2,
    deceleration: 0.1,
    maxSpeed: 7,
    friction: 0.96,
    steer: 0.06
};

const keys = {};
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

function update() {
    // RESET BUTTON: Press 'R' to bring the car back to center
    if (keys["r"]) {
        car.x = 400;
        car.y = 300;
        car.speed = 0;
        car.angle = 0;
    }

    if (keys["w"]) car.speed += car.acceleration;
    if (keys["s"]) car.speed -= car.deceleration;

    car.speed *= car.friction;
    if (Math.abs(car.speed) < 0.1) car.speed = 0;

    if (car.speed !== 0) {
        const direction = car.speed > 0 ? 1 : -1;
        const steeringFactor = Math.min(Math.abs(car.speed) / 2, 1); 
        if (keys["a"]) car.angle -= car.steer * direction * steeringFactor;
        if (keys["d"]) car.angle += car.steer * direction * steeringFactor;
    }

    car.x += Math.cos(car.angle) * car.speed;
    car.y += Math.sin(car.angle) * car.speed;

    // Fixed Screen Wrap Logic
    if (car.x > canvas.width + 50) car.x = -50;
    if (car.x < -50) car.x = canvas.width + 50;
    if (car.y > canvas.height + 50) car.y = -50;
    if (car.y < -50) car.y = canvas.height + 50;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw Debug Info (Top Left)
    ctx.fillStyle = "white";
    ctx.font = "16px Arial";
    ctx.fillText(`Speed: ${car.speed.toFixed(2)}`, 10, 20);
    ctx.fillText(`Pos: ${Math.round(car.x)}, ${Math.round(car.y)}`, 10, 40);
    ctx.fillText(`Press 'R' to Reset`, 10, 60);

    ctx.save();
    ctx.translate(car.x, car.y);
    ctx.rotate(car.angle);
    
    // Body
    ctx.fillStyle = "red";
    ctx.fillRect(-car.height / 2, -car.width / 2, car.height, car.width);
    // Front highlight
    ctx.fillStyle = "white";
    ctx.fillRect(car.height / 4, -car.width / 2, 10, car.width);
    
    ctx.restore();
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
